name: E2E tests

on:
  workflow_dispatch:
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run e2e tests
        run: ./e2e/run.sh

      - name: Dump service logs
        if: failure()
        run: cd e2e && docker compose logs --tail=200

      - name: Cleanup
        if: always()
        run: ./e2e/run.sh --cleanup
